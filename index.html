<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DaxChain</title>
    <meta name="description" content="DaxChain website">
    <style>
      :root {
        color-scheme: dark;
        --bg: #080b12;
        --fg: #f5f7fb;
        --muted: #aab4c5;
        --line: rgba(255, 255, 255, 0.16);
        --accent: #62d6a2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(98, 214, 162, 0.18), transparent 32rem),
          radial-gradient(circle at 80% 80%, rgba(96, 165, 250, 0.12), transparent 30rem),
          var(--bg);
        color: var(--fg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(42rem, calc(100vw - 2rem));
        padding: 4rem 0;
      }

      .mark {
        width: 4rem;
        height: 4rem;
        margin-bottom: 2rem;
        border: 1px solid var(--line);
        border-radius: 1rem;
        display: grid;
        place-items: center;
        color: var(--accent);
        font-weight: 800;
        font-size: 1.5rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 8vw, 5.5rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 32rem;
        margin: 1.5rem 0 0;
        color: var(--muted);
        font-size: 1.125rem;
        line-height: 1.7;
      }

      a {
        color: var(--fg);
        text-decoration-color: var(--accent);
        text-underline-offset: 0.25em;
      }

      .meta {
        margin-top: 2.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--line);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">DX</div>
      <h1>DaxChain</h1>
      <p>Infrastructure is moving. The new site is being prepared on GitHub Pages.</p>
      <p class="meta">
        API services remain available at <a href="https://api.daxchain.io">api.daxchain.io</a>.
      </p>
    </main>
  </body>
</html>
